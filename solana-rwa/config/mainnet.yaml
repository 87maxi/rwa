# =============================================================================
# Mainnet Configuration Overrides
# Solana Mainnet for production
# =============================================================================

# Network settings
network:
  rpc_url: https://api.mainnet-beta.solana.com
  websocket_url: wss://api.mainnet-beta.solana.com
  cluster: mainnet
  keypair: ~/.config/solana/mainnet.json

# Surfpool settings (disabled for mainnet)
surfpool:
  enabled: false
  auto_start: false
  instant_deployment: false

# Program IDs (must be populated with production addresses)
programs:
  compliance_aggregator: ""
  identity_registry: ""
  solana_rwa: ""

# TXTX settings
txtx:
  signer_strategy: squads
  state_location: .surfpool/state

# Anchor provider
provider:
  cluster: mainnet
  wallet: ~/.config/solana/mainnet.json

# Deployment settings
deployment:
  skip_if_deployed: false
  timeout: 180000

# Build settings
build:
  verbose: true
  wasm: true
  so: false
  verifiable: true
