# =============================================================================
# Localnet Configuration Overrides
# Surfpool local development network
# =============================================================================

# Network settings
network:
  rpc_url: http://127.0.0.1:8899
  websocket_url: ws://127.0.0.1:8900
  cluster: localnet
  keypair: ~/.config/solana/id.json

# Surfpool settings
surfpool:
  enabled: true
  auto_start: true
  auto_restart: true
  instant_deployment: true
  dashboard_port: 5173
  log_level: info
  test_ledger_reset: true
  reset_ledger_sleep: 1000

# Program IDs (pre-configured for localnet)
programs:
  compliance_aggregator: "3nf1C8FuDP5SreRF6WZAiiRDpNS4LLbemZPefde5Mre3"
  identity_registry: "3QreJufDNn5MgdhDtWuYBW2WmQnbDzwf9zLTxXkub8X5"
  solana_rwa: "7URg5r88otZuAXX5a9ju8pauWUHLFSALdAvnjMRmcd3L"

# TXTX settings
txtx:
  signer_strategy: secret_key
  state_location: .surfpool/state

# Anchor provider
provider:
  cluster: localnet
  wallet: ~/.config/solana/id.json

# Deployment settings
deployment:
  skip_if_deployed: true
  timeout: 60000

# Build settings
build:
  verbose: false
  wasm: true
  so: true
