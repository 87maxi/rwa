# =============================================================================
# Devnet Configuration Overrides
# Solana Devnet for testing
# =============================================================================

# Network settings
network:
  rpc_url: https://api.devnet.solana.com
  websocket_url: wss://api.devnet.solana.com
  cluster: devnet
  keypair: ~/.config/solana/devnet.json

# Surfpool settings (disabled for devnet)
surfpool:
  enabled: false
  auto_start: false
  instant_deployment: false

# Program IDs (empty - populated after deployment)
programs:
  compliance_aggregator: ""
  identity_registry: ""
  solana_rwa: ""

# TXTX settings
txtx:
  signer_strategy: web_wallet
  state_location: .surfpool/state

# Anchor provider
provider:
  cluster: devnet
  wallet: ~/.config/solana/devnet.json

# Deployment settings
deployment:
  skip_if_deployed: false
  timeout: 120000

# Build settings
build:
  verbose: true
  wasm: true
  so: false
